version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Dev dependencies — minor and patch only. Major bumps (e.g.
      # ESLint 9→10, TypeScript 5→6, Vitest 3→4) come through as
      # individual PRs so each can be assessed and migrated in
      # isolation. See retrospectives/
      # 2026-05-02-wave-1-and-ignored-playwright-failures.md (action #4).
      dev-dependencies-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      runtime-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
