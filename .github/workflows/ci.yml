name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  openspec:
    name: openspec validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Validate specs
        run: npx --yes @fission-ai/openspec@1.1.1 validate --specs
      - name: Validate active changes (strict)
        run: npx --yes @fission-ai/openspec@1.1.1 validate --changes --strict

  # The Next.js typecheck and lint jobs activate once `package.json` lands.
  # Until then the typecheck/lint placeholders below are intentionally
  # disabled (no `if:` triggers them) so PRs aren't blocked by missing
  # tooling. When the scaffold lands, switch them on by removing the
  # `if: false` guard.

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
