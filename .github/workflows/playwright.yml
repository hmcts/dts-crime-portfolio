name: playwright

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Always-succeeding guard. Replaces the previous job-level
  # `if: hashFiles('playwright.config.ts') != ''`, which caused
  # GitHub Actions to report the workflow conclusion as `failure`
  # rather than `success` / `skipped` when all jobs were skipped.
  # See retrospectives/2026-05-02-wave-1-and-ignored-playwright-failures.md.
  guard:
    name: detect playwright config
    runs-on: ubuntu-latest
    outputs:
      has_config: ${{ steps.check.outputs.has_config }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f playwright.config.ts ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
            echo "::notice::playwright.config.ts present — running e2e job."
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No playwright.config.ts at HEAD; skipping e2e."
          fi

  e2e:
    name: e2e
    needs: guard
    if: needs.guard.outputs.has_config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
