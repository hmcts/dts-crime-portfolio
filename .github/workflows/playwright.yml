name: playwright

# Triggers fire on push-to-main as well as on pull_request, but the e2e
# job below skips when `github.event_name == 'push'`. Branch protection
# already requires this workflow to be green BEFORE the merge — re-running
# it after the merge is redundant and burns CI minutes for no signal.
# Manual re-run is supported via `workflow_dispatch`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# This workflow now runs unconditionally on PRs — there are real e2e
# tests in `playwright/tests/`. Earlier history (PR #58) deleted the
# workflow because no tests existed and the prior `if: hashFiles(...)`
# skip pattern caused GitHub Actions to report `failure` for every
# empty run. See retrospectives/2026-05-02-wave-1-and-ignored-playwright-failures.md
# action item 2.

jobs:
  e2e:
    name: e2e
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.4.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm test:e2e

      # The HTML report is small and useful on every run — passing runs
      # carry timing data and per-test summaries that help spot flake or
      # creeping slowness before it becomes a failure. Always upload.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      # test-results/ holds traces, screenshots, and (when configured)
      # videos for failed tests only — playwright.config.ts uses
      # `trace: "retain-on-failure"` and `screenshot: "only-on-failure"`.
      # On a green run this directory is empty, so keep this gated on
      # failure to avoid uploading nothing.
      - name: Upload test-results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
