name: codeql

on:
  # Push-to-main is intentional — the Security tab is populated from
  # the default-branch CodeQL run, so the post-merge analysis is the
  # authoritative one and SHOULD NOT be skipped here (unlike `ci`,
  # which has nothing useful to do post-merge).
  push:
    branches: [main]
  # PR analysis flags new vulnerabilities introduced by the change.
  # Same pull_request shape as `ci.yml` so contributors only have one
  # PR-trigger pattern to remember.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # Weekly cron catches drift in CodeQL's own rule set against an
  # otherwise-quiet codebase.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
