name: codeql

on:
  # PR analysis flags new vulnerabilities introduced by the change.
  # Same pull_request shape as `ci.yml` so contributors only have one
  # PR-trigger pattern to remember.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # Weekly cron is the canonical default-branch run that feeds the
  # Security tab. Trade-off vs push-on-main: the tab is at most 7 days
  # stale on the latest main, but PR analysis still flags new vulns
  # before they reach main.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
