name: deploy

# Triggered directly by every push to main. Branch protection requires
# the `ci` and `playwright` workflows to be green on the PR before merge,
# so a push to main is by definition the merge of an already-tested PR.
# Previously this workflow chained off `workflow_run: ci` so it would
# run after the redundant post-merge CI re-run; we now skip those
# re-runs (`github.event_name != 'push'` guard in ci.yml + playwright.yml),
# so deploy fires on the push directly. Manual re-deploy is supported via
# `workflow_dispatch`.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-preview:
    name: deploy preview to render
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ vars.RENDER_PREVIEW_URL }}
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Render returns:
          #  - HTTP 200 + {"deploy":{"id":"..."}} — a new deploy started
          #  - HTTP 202 + {} — a deploy is already in flight; Render will
          #    pick up the latest commit when it finishes. This happens
          #    when several merges land back-to-back.
          # Both are success from our point of view: the next deploy
          # will reflect HEAD. Anything else is an error.
          response=$(curl --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --write-out "\nhttp_status:%{http_code}" \
            --data '{}' \
            "${RENDER_DEPLOY_HOOK_URL}")
          echo "${response}"
          status=$(echo "${response}" | sed -n 's/^http_status://p' | tr -d '[:space:]')
          case "${status}" in
            200|202)
              echo "Render accepted the deploy hook (HTTP ${status})."
              ;;
            *)
              echo "::error::Render rejected the deploy hook (HTTP ${status})."
              exit 1
              ;;
          esac
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
