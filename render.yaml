# Render Blueprint
# Spec: https://render.com/docs/blueprint-spec
#
# Provisions the preview Web Service for the Crime Portfolio. Deployment
# is triggered by .github/workflows/deploy.yml on every successful CI run
# against main, NOT by Render's auto-deploy. Set autoDeploy: false here
# and use a deploy hook from the Render dashboard.
#
# After importing this blueprint in Render:
#   1. Set the secret env vars marked `sync: false` in the dashboard
#      (SANITY_API_TOKEN, ADMIN_ALLOWLIST, POSTHOG_PROJECT_KEY,
#      POSTHOG_INGEST_URL, ANALYTICS_INGEST_MODE,
#      ANALYTICS_USER_ID_PEPPER).
#   2. Create a deploy hook (Service settings → Deploy Hooks → New).
#   3. Add the deploy-hook URL to GitHub repo secrets as
#      RENDER_DEPLOY_HOOK_URL.
#   4. Merge to main; the deploy workflow takes over from there.

services:
  - type: web
    name: dts-crime-portfolio-preview
    runtime: node
    region: oregon
    plan: starter
    branch: main
    autoDeploy: false
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      # Pinned to .nvmrc; Render reads this if .nvmrc isn't honoured.
      - key: NODE_VERSION
        value: "22"

      # Application environment — preview deployment.
      - key: APP_ENVIRONMENT
        value: preview

      # Sanity — non-secret. Same defaults as sanity.config.ts so missing
      # env doesn't break the build, but the production deploy will set
      # different values.
      - key: NEXT_PUBLIC_SANITY_PROJECT_ID
        value: vi5mhbtl
      - key: NEXT_PUBLIC_SANITY_DATASET
        value: preview

      # Sanity API token — server-side only. Editor role, scoped to the
      # preview dataset. Set in the Render dashboard.
      - key: SANITY_API_TOKEN
        sync: false

      # Preview-auth cookie HMAC secret. Render generates a strong value
      # and reuses it across deploys until the service is recreated.
      - key: PREVIEW_AUTH_COOKIE_SECRET
        generateValue: true

      # Admin allowlist — comma- or whitespace-separated emails. Set in
      # the dashboard so adding/removing admins doesn't require a code
      # change.
      - key: ADMIN_ALLOWLIST
        sync: false

      # Logger threshold. Default is info; raise to debug for diagnostic
      # builds via the dashboard.
      - key: LOG_LEVEL
        value: info

      # Analytics (PostHog). The portal has no PostHog SDK dependency —
      # `lib/analytics/client.ts` POSTs events directly via fetch. Spec:
      # openspec/specs/analytics/spec.md.
      #
      # POSTHOG_PROJECT_KEY — the `phc_…` Project API key. Server-side
      # only when ANALYTICS_INGEST_MODE=proxy; never reaches the browser.
      - key: POSTHOG_PROJECT_KEY
        sync: false

      # POSTHOG_INGEST_URL — region-dependent. EU Cloud:
      # https://eu.i.posthog.com (default). US Cloud:
      # https://us.i.posthog.com. Self-hosted: your origin.
      - key: POSTHOG_INGEST_URL
        sync: false

      # ANALYTICS_INGEST_MODE — one of `direct` or `proxy`. `proxy` is
      # recommended: the browser POSTs to the same-origin
      # /api/analytics/ingest route, which forwards server-side with the
      # project key attached. The browser never holds the key.
      - key: ANALYTICS_INGEST_MODE
        sync: false

      # ANALYTICS_USER_ID_PEPPER — server-only secret mixed into the
      # SHA-256 of the user's email to produce a stable but
      # non-reversible distinct_id. Generate with `openssl rand -hex 32`.
      # Rotating discontinues identifier stability — historic events
      # remain associated with the previous pepper. See
      # decisions/2026-05-02-defer-secrets-manager-choice-until-production.md.
      - key: ANALYTICS_USER_ID_PEPPER
        sync: false

      # ANALYTICS_DROP_IP — `true` strips x-forwarded-for / x-real-ip
      # before forwarding through the proxy. Privacy-by-default for the
      # preview environment.
      - key: ANALYTICS_DROP_IP
        value: "true"
